# fly.toml app configuration file

app = 'arif-bingo'
primary_region = 'iad'
console_command = '/code/manage.py shell'

[build]
  dockerfile = "./Dockerfile"

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8000'

[vm]
  size = "shared-cpu-2x"
  memory_mb = 512

[http_service]
  internal_port = 8000
  force_https = true

  # ❌ Disable auto start
  auto_start_machines = true

  # ❌ Disable auto stop
  auto_stop_machines = true

  # ❌ Do not keep machines running automatically
  min_machines_running = 1

  processes = ['app']

[processes]
  app = "bash /start-app.sh"
  worker = "celery -A bingo worker --loglevel=info --concurrency=1 --max-tasks-per-child=50 --max-memory-per-child=200000"

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
