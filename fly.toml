# fly.toml app configuration file
# PROMO-SAFE ARCHITECTURE: Separate process groups for isolation

app = 'arif-bingo'
primary_region = 'iad'
console_command = '/code/manage.py shell'

[build]
  dockerfile = "./Dockerfile"

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8000'

# Process groups configuration
# Each group handles different responsibilities for isolation
[processes]
  # Gameplay: Game APIs only (isolated from registration traffic)
  gameplay = "bash /start-gameplay.sh"
  
  # Registration: Registration + Telegram bot (handles promo traffic)
  registration = "bash /start-registration.sh"
  
  # Admin: Admin dashboard (isolated from gameplay/registration)
  admin = "bash /start-admin.sh"
  
  # Celery: Background tasks (rewards, cleanup, etc.)
  celery = "bash /start-celery.sh"
  
  # Legacy: Default app (backward compatibility)
  app = "bash /start-app.sh"

# HTTP service configuration
# Routes traffic to gameplay, registration, and admin processes
[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = false
  auto_stop_machines = false
  min_machines_running = 0
  
  # All HTTP processes handle requests
  processes = ['gameplay', 'registration', 'admin']

# VM configuration
# 2GB RAM per machine (updated from 1GB for better performance)
[vm]
  size = "shared-cpu-2x"
  memory_mb = 2048

# Static files
[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
