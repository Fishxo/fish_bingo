# Production nginx config with Let's Encrypt (sslip.io or your domain)
# Install: sudo cp nginx/fish_bingo_https.conf /etc/nginx/sites-available/fish_bingo

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 16-16-200-57.sslip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name 16.16.200.57;
    return 301 https://16-16-200-57.sslip.io$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 16-16-200-57.sslip.io;

    ssl_certificate /etc/letsencrypt/live/16-16-200-57.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/16-16-200-57.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/fish_bingo_access.log;
    error_log /var/log/nginx/fish_bingo_error.log;
    client_max_body_size 10M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /static/ {
        alias /home/ubuntu/fish_bingo/backend/static/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /home/ubuntu/fish_bingo/backend/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
