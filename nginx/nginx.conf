# Nginx configuration for Django app with HTTPS support
# Place this file at /etc/nginx/sites-available/bingo
# Then create symlink: sudo ln -s /etc/nginx/sites-available/bingo /etc/nginx/sites-enabled/
# Remove default: sudo rm /etc/nginx/sites-enabled/default

# HTTP server - redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name goodbingo.shop www.goodbingo.shop;  # Replace with your domain or Elastic IP

    # Allow Let's Encrypt challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server - main application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name goodbingo.shop www.goodbingo.shop;  # Replace with your domain

    # SSL certificate paths (will be set by Certbot)
    ssl_certificate /etc/letsencrypt/live/goodbingo.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/goodbingo.shop/privkey.pem;

    # SSL configuration (modern, secure)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/bingo_access.log;
    error_log /var/log/nginx/bingo_error.log;

    # Maximum upload size
    client_max_body_size 10M;

    # Static files (Django collects these)
    location /static/ {
        alias /home/ubuntu/apps/good-bingo/arif_bingo/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Media files (if you have user uploads)
    location /media/ {
        alias /home/ubuntu/apps/good-bingo/arif_bingo/backend/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # WebSocket support for Django Channels
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Main application proxy to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket headers (may be needed for some WebSocket connections)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

